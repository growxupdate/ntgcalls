name: Build ntgcalls wheels

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name"
        required: true
        default: "v2.2.1.1-growx1"
      create-release:
        description: "Create/update GitHub Release and upload wheels"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-x86_64-wheel:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            git \
            curl \
            libasound2-dev \
            libpulse-dev

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        env:
          PYPI_TAGS: "1"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
          MAKEFLAGS: "-j2"
        run: |
          python -m pip install -U pip setuptools wheel build
          python -m build --wheel --no-isolation

      - name: Test wheel import
        run: |
          python -m pip install --force-reinstall --no-cache-dir dist/*.whl
          python - <<'PY'
          import ntgcalls
          print(ntgcalls.__file__)
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntgcalls-linux-x86_64-cp${{ matrix.python-version }}-wheel
          path: dist/*.whl
          if-no-files-found: error

      - name: Upload wheels to GitHub Release
        if: github.event_name == 'push' || github.event.inputs.create-release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "NTgCalls custom wheels ${{ github.event.inputs.tag || github.ref_name }}"
          body: "Custom ntgcalls wheels built from ${{ github.sha }}. These are linux_x86_64 wheels for Ubuntu/Render-style Linux, not manylinux/PyPI wheels. Runtime may need libasound2 and libpulse0."
          prerelease: true
          files: dist/*.whl
