name: Build ntgcalls wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config python3-dev git \
            libasound2-dev libpulse-dev

      - name: Build wheel
        run: |
          python -m pip install -U pip setuptools wheel build cmake ninja
          python -m build --wheel

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ntgcalls-wheels
          path: dist/*.whl

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl


